<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>USC Student Housing Matcher</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="top-bar">
    <div class="inner">
      <h1>USC Student Housing Matcher</h1>
      <div class="tagline">Real listings from USC-area property managers</div>
    </div>
  </div>

  <div class="page">
    <div class="card">
      <form action="/submit" method="post" class="form-grid">

        <div class="field">
          <label for="budget_max">1. Monthly budget maximum</label>
          <input type="number" step="1" min="0" name="budget_max" id="budget_max" placeholder="e.g. 1800" required>
        </div>

        <div class="field">
          <label for="unit_type">2. Entire unit to yourself, or open to a shared house?</label>
          <select name="unit_type" id="unit_type" required>
            <option value="entire">Entire unit</option>
            <option value="shared">Shared house</option>
          </select>
        </div>

        <div class="field">
          <label for="room_privacy">3. If shared <span class="hint">(ignored for entire unit)</span>: private room, or open to sharing?</label>
          <select name="room_privacy" id="room_privacy">
            <option value="private">Private room</option>
            <option value="shared">Open to sharing a room</option>
          </select>
        </div>

        <div class="field">
          <label for="bathroom_privacy">4. If shared <span class="hint">(ignored for entire unit)</span>: private bathroom, or open to sharing?</label>
          <select name="bathroom_privacy" id="bathroom_privacy">
            <option value="private">Private bathroom</option>
            <option value="shared">Open to sharing a bathroom</option>
          </select>
        </div>

        <div class="field">
          <label for="unit_size">5. Unit size preference</label>
          <select name="unit_size" id="unit_size" required>
            <option value="studio">Studio</option>
            <option value="1br">One bedroom</option>
            <option value="2br">Two bedroom</option>
            <option value="3br+">Three plus bedroom</option>
          </select>
        </div>

        <div class="field">
          <label for="distance_max_miles">6. Max distance from USC in miles <span class="hint">(default 3)</span></label>
          <input type="number" step="0.1" min="0" name="distance_max_miles" id="distance_max_miles" placeholder="3">
        </div>

        <div class="field">
          <label for="move_in_date">7. Move in date</label>
          <input type="date" name="move_in_date" id="move_in_date" required>
        </div>

        <div class="field">
          <label for="has_pet">8. Do you have a pet?</label>
          <select name="has_pet" id="has_pet" required>
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>

        <button type="submit" class="btn-primary">Find matches</button>
      </form>
    </div>
  </div>
</body>
</html>
